name: Multi-Feature Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.feature }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        feature: [default, mupdf]

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSVC (Required for C++ deps like MuPDF)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install LLVM (MuPDF only)
        if: matrix.feature == 'mupdf'
        run: |
          choco install llvm
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $GITHUB_ENV
          echo "C:\Program Files\LLVM\bin" >> $GITHUB_PATH

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: |
          $env:RUSTC_WRAPPER = "sccache"
          $env:SCCACHE_GHA_ENABLED = "true"
          if ("${{ matrix.feature }}" -eq "mupdf") {
            cargo build --release --features mupdf -j 1
          } else {
            cargo build --release -j 1
          }
          sccache --show-stats

      - name: Prepare Artifact
        run: |
          mkdir dist
          Get-ChildItem -Path target/release -Filter pdfium.dll -Recurse | Copy-Item -Destination dist/
          Get-ChildItem -Path target/release -Filter tree-pdf-viewer.exe -Recurse | Copy-Item -Destination dist/
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tree-pdf-viewer-${{ matrix.feature }}
          path: dist/
