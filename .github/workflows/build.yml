name: Multi-Feature Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.feature }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - feature: default
            args: ""
          - feature: mupdf
            args: "--features mupdf"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        if: matrix.feature == 'mupdf'

      - name: Install LLVM
        run: choco install llvm -y
        if: matrix.feature == 'mupdf'

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release ${{ matrix.args }}

      - name: sccache stats
        run: sccache --show-stats

      - name: Prepare Artifact
        run: |
          mkdir dist
          Get-ChildItem -Path target/release -Filter pdfium.dll -Recurse | Copy-Item -Destination dist/
          Get-ChildItem -Path target/release -Filter tree-pdf-viewer.exe -Recurse | Copy-Item -Destination dist/
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tree-pdf-viewer-${{ matrix.feature }}
          path: dist/